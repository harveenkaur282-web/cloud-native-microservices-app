apiVersion: v1
kind: Secret
metadata:
  name: cloudcart-secrets
  namespace: cloudcart
type: Opaque
data:
  # Base64 encoded values required for the deployment
  SECRET_KEY: <BASE64_ENCODED_SECRET_KEY>
  USER_DATABASE_URL: <BASE64_ENCODED_USER_DATABASE_URL>
  PRODUCT_DATABASE_URL: <BASE64_ENCODED_PRODUCT_DATABASE_URL>
  ORDER_DATABASE_URL: <BASE64_ENCODED_ORDER_DATABASE_URL>
  INVENTORY_DATABASE_URL: <BASE64_ENCODED_INVENTORY_DATABASE_URL>
