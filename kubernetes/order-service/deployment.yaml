apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: cloudcart
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: cloud-native-microservices-app-order-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8003
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cloudcart-secrets
              key: ORDER_DATABASE_URL
        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: cloudcart-config
              key: PRODUCT_SERVICE_URL
        - name: INVENTORY_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: cloudcart-config
              key: INVENTORY_SERVICE_URL
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
