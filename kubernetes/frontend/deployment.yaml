apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloudcart
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: harveen421/cloudcart-frontend:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_GATEWAY_URL
          valueFrom:
            configMapKeyRef:
              name: cloudcart-config
              key: NEXT_PUBLIC_API_GATEWAY_URL
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cloudcart
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer
