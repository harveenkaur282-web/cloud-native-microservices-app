name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Microservices
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
            image: harveen421/cloudcart-frontend
          - name: api-gateway
            context: ./services/api-gateway
            image: harveen421/cloudcart-api-gateway
          - name: user-service
            context: ./services/user-service
            image: harveen421/cloudcart-user-service
          - name: product-service
            context: ./services/product-service
            image: harveen421/cloudcart-product-service
          - name: order-service
            context: ./services/order-service
            image: harveen421/cloudcart-order-service
          - name: inventory-service
            context: ./services/inventory-service
            image: harveen421/cloudcart-inventory-service
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine Image Tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          # Get semantic version from package.json or defaults to v1.0.0
          if [ "${{ matrix.name }}" = "frontend" ] && [ -f "frontend/package.json" ]; then
            VERSION="v$(node -p "require('./frontend/package.json').version" 2>/dev/null || echo "1.0.0")"
          else
            VERSION="v1.0.0"
          fi
          echo "tag_sha=${{ matrix.image }}:${VERSION}-${SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=${{ matrix.image }}:latest" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.tags.outputs.tag_sha }}
            ${{ steps.tags.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
